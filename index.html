<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平面面積計算器</title>
<style>
  :root {
    --bg: #0f1115; --panel: #1a1d24; --panel-2: #232733; --border: #333846;
    --text: #e6e9ef; --muted: #9aa3b2; --accent: #4f9dff; --accent-2: #2ecc71;
    --danger: #ff5c5c; --ruler: #ffcc33;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
  }
  header { padding: 16px 20px; background: var(--panel); border-bottom: 1px solid var(--border); }
  header h1 { margin: 0; font-size: 18px; }
  header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
  .wrap { display: flex; gap: 16px; padding: 16px; flex-wrap: wrap; }
  .sidebar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .card h2 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .canvas-area {
    flex: 1; min-width: 320px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 10px;
  }
  .guide {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--border); font-size: 15px; line-height: 1.6;
  }
  .guide .badge {
    display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px;
    border-radius: 50%; flex-shrink: 0; background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
  }
  .guide.calib { border-color: var(--ruler); }
  .guide.calib .badge { background: var(--ruler); color: #3a2e00; }
  .guide.done { border-color: var(--accent-2); }
  .guide.done .badge { background: var(--accent-2); color: #06341c; }
  .guide .len-inline {
    width: 62px; padding: 4px 6px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; text-align: center;
  }
  .glink { color: var(--accent); cursor: pointer; text-decoration: underline; white-space: nowrap; }
  #stage-wrap {
    position: relative; width: 100%; overflow: auto; background: #000; border-radius: 8px;
    display: flex; justify-content: center; align-items: center; min-height: 300px;
  }
  canvas { display: block; max-width: 100%; touch-action: none; cursor: crosshair; }
  .empty-hint { color: var(--muted); padding: 60px 20px; text-align: center; font-size: 14px; }
  button {
    font-family: inherit; font-size: 14px; border: none; border-radius: 8px; padding: 9px 12px;
    cursor: pointer; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); transition: .15s;
  }
  button:hover { border-color: var(--accent); }
  .file-btn {
    display: block; text-align: center; background: var(--panel-2); border: 1px dashed var(--border);
    border-radius: 8px; padding: 14px; cursor: pointer; color: var(--muted); font-size: 14px;
  }
  .file-btn:hover { border-color: var(--accent); color: var(--text); }
  input[type="file"] { display: none; }
  label.small { font-size: 12px; color: var(--muted); display: block; margin: 12px 0 6px; }
  .status { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 10px; }
  .status b { color: var(--text); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .region-item {
    display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 8px; background: var(--panel-2);
  }
  .region-item .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(0,0,0,.4); }
  .region-item .rlabel { font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .region-item .rval { font-size: 16px; font-weight: 700; margin-left: auto; }
  .region-item .runit { font-size: 11px; color: var(--muted); }
  .region-item .rdel { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 6px; font-size: 14px; }
  .region-item .rdel:hover { color: var(--danger); }
  .region-empty { font-size: 13px; color: var(--muted); padding: 4px 2px; }
  .total {
    margin-top: 6px; padding: 12px; border-radius: 10px; text-align: center;
    background: linear-gradient(135deg, #16351f, #1a1d24); border: 1px solid #2c6e49;
  }
  .total .val { font-size: 24px; font-weight: 800; color: var(--accent-2); }
  .total .unit { font-size: 12px; color: var(--muted); }
  .density-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .density-grid button { padding: 8px 0; font-size: 14px; }
  .density-grid button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .graft-row {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px;
    background: var(--panel-2); font-size: 13px;
  }
  .graft-row .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .graft-row .gval { margin-left: auto; font-weight: 700; }
  .total.graft { background: linear-gradient(135deg, #142a45, #1a1d24); border: 1px solid #2c5a8f; }
  .total.graft .val { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>📐 平面面積計算器</h1>
  <p>拍完照直接顯示:自動偵測下方的尺與黑/藍框,算出每個框內面積與植髮株數</p>
</header>

<div class="wrap">
  <div class="sidebar">
    <div class="card">
      <h2>載入照片</h2>
      <label class="file-btn" for="file">📷 選擇 / 拍攝照片</label>
      <input type="file" id="file" accept="image/*">
      <div class="hint">照片下方放一把 15cm 的尺,待測區域用黑色或藍色畫出封閉框線(同一平面、正對拍攝)。載入後自動分析。</div>
      <div class="status" id="calibStatus">尚未載入照片</div>
    </div>

    <div class="card">
      <h2>面積結果</h2>
      <div id="regionList"><div class="region-empty">尚無偵測到的框</div></div>
      <div class="total">
        <div class="val" id="totalVal">—</div>
        <div class="unit">總面積 cm²</div>
      </div>
    </div>

    <div class="card">
      <h2>植髮數量計算</h2>
      <label class="small" style="margin-top:0">植髮密度(株 / cm²)</label>
      <div class="density-grid" id="densityGrid">
        <button data-d="30">30</button>
        <button data-d="40">40</button>
        <button data-d="50" class="active">50</button>
        <button data-d="60">60</button>
        <button data-d="70">70</button>
        <button data-d="80">80</button>
        <button data-d="90">90</button>
      </div>
      <div id="graftList" style="margin-top:10px"><div class="region-empty">偵測到框後自動估算</div></div>
      <div class="total graft">
        <div class="val" id="graftVal">—</div>
        <div class="unit">預估需要植髮株數</div>
      </div>
    </div>
  </div>

  <div class="canvas-area">
    <div class="guide" id="guide">
      <span class="badge" id="guideBadge">1</span>
      <span id="guideText" style="flex:1">載入照片後自動偵測尺與框框,直接顯示面積</span>
    </div>
    <div id="stage-wrap">
      <div class="empty-hint" id="emptyHint">請先於左側載入一張照片 👈</div>
      <canvas id="canvas" style="display:none"></canvas>
    </div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const fileInput = document.getElementById('file');
  const emptyHint = document.getElementById('emptyHint');
  const calibStatus = document.getElementById('calibStatus');
  const regionList = document.getElementById('regionList');
  const totalVal = document.getElementById('totalVal');
  const guide = document.getElementById('guide');
  const guideBadge = document.getElementById('guideBadge');
  const guideText = document.getElementById('guideText');
  const densityGrid = document.getElementById('densityGrid');
  const graftList = document.getElementById('graftList');
  const graftVal = document.getElementById('graftVal');

  const PALETTE = ['#2ecc71', '#4f9dff', '#ff8c42', '#c77dff', '#ff5c8a', '#43d9c9', '#f4d35e', '#a0e548'];
  const DEFAULT_LEN = 15;
  const MAX_ANALYSIS = 1400;   // 偵測用縮圖最長邊

  let img = null;
  let scale = 1;               // 顯示縮放
  let mode = null;             // 'calib'(手動標尺中) | null
  let calibPts = [];           // 尺兩端(原始像素座標),自動或手動
  let rulerPx = null;          // 尺在原始影像中的像素長
  let cmPerPx = null;
  let knownLen = DEFAULT_LEN;
  let rulerAuto = false;       // 尺是否為自動偵測
  let analysis = null;         // {data,w,h,af}
  let scratch = null;          // 偵測用重複使用緩衝區
  let rulerBox = null;         // 自動偵測到的尺 bbox(縮圖座標)
  let regions = [];            // {overlay,octx,idxs,pxArea,label,palIdx,cx,cy}
  let nextPal = 0;
  let lastMsg = '';
  let density = 50;

  fileInput.addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const url = URL.createObjectURL(f);
    const im = new Image();
    im.onload = () => {
      img = im;
      setupCanvas();
      buildAnalysis();
      autoAnalyze();
      refresh();
      URL.revokeObjectURL(url);
    };
    im.src = url;
  });

  function setupCanvas() {
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    emptyHint.style.display = 'none';
    canvas.style.display = 'block';
    const wrap = document.getElementById('stage-wrap');
    const maxW = wrap.clientWidth - 4;
    const dispW = Math.min(img.naturalWidth, maxW);
    scale = dispW / img.naturalWidth;
    canvas.style.width = dispW + 'px';
    canvas.style.height = (img.naturalHeight * scale) + 'px';
  }

  function buildAnalysis() {
    const ow = img.naturalWidth, oh = img.naturalHeight;
    const af = Math.min(1, MAX_ANALYSIS / Math.max(ow, oh));
    const w = Math.max(1, Math.round(ow * af));
    const h = Math.max(1, Math.round(oh * af));
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    const o = off.getContext('2d');
    o.drawImage(img, 0, 0, w, h);
    analysis = { data: o.getImageData(0, 0, w, h).data, w, h, af };
    const N = w * h;
    scratch = { wall: new Uint8Array(N), outside: new Uint8Array(N), comp: new Uint8Array(N), stack: new Int32Array(N) };
  }

  // ===== 全自動分析:尺 + 框 =====
  function autoAnalyze() {
    regions = []; nextPal = 0; lastMsg = '';
    const ruler = autoDetectRuler();
    if (ruler) {
      rulerPx = ruler.lenOrigPx;
      calibPts = ruler.endpoints;
      rulerBox = ruler.bbox;
      rulerAuto = true;
      cmPerPx = knownLen / rulerPx;
      mode = null;
    } else {
      rulerPx = null; cmPerPx = null; calibPts = []; rulerBox = null; rulerAuto = false;
      mode = 'calib';   // 找不到尺 → 請使用者點兩端
    }
    autoDetectFrames();
  }

  // 自動偵測尺:在下半部找「亮、低彩度、細長」的物體,以整支長度 = knownLen cm 估算
  function autoDetectRuler() {
    const { data, w, h, af } = analysis;
    const y0 = Math.floor(h * 0.45);
    const visited = new Uint8Array(w * h);
    const stack = scratch.stack;
    const isRuler = i => {
      const q = i * 4, r = data[q], g = data[q + 1], b = data[q + 2];
      const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
      return mx > 140 && (mx - mn) < 55;
    };
    let best = null;
    for (let y = y0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const start = y * w + x;
        if (visited[start] || !isRuler(start)) continue;
        // 淹水收集連通塊
        let sp = 0, count = 0, sx = 0, sy = 0;
        let minx = x, maxx = x, miny = y, maxy = y;
        visited[start] = 1; stack[sp++] = start;
        const idxs = [];
        while (sp > 0) {
          const i = stack[--sp], ix = i % w, iy = (i / w) | 0;
          count++; sx += ix; sy += iy; idxs.push(i);
          if (ix < minx) minx = ix; if (ix > maxx) maxx = ix;
          if (iy < miny) miny = iy; if (iy > maxy) maxy = iy;
          let j;
          if (ix > 0) { j = i - 1; if (!visited[j] && ((j / w) | 0) >= y0 && isRuler(j)) { visited[j] = 1; stack[sp++] = j; } }
          if (ix < w - 1) { j = i + 1; if (!visited[j] && ((j / w) | 0) >= y0 && isRuler(j)) { visited[j] = 1; stack[sp++] = j; } }
          if (iy > y0) { j = i - w; if (!visited[j] && isRuler(j)) { visited[j] = 1; stack[sp++] = j; } }
          if (iy < h - 1) { j = i + w; if (!visited[j] && isRuler(j)) { visited[j] = 1; stack[sp++] = j; } }
        }
        const bw = maxx - minx + 1, bh = maxy - miny + 1;
        const long = Math.max(bw, bh), short = Math.min(bw, bh);
        const fill = count / (bw * bh);
        // 細長 + 夠長 + 夠實心 → 候選尺
        if (long >= 0.28 * w && long >= 3 * short && short < 0.25 * h && fill > 0.3) {
          if (!best || long > best.long) best = { idxs, count, sx, sy, minx, maxx, miny, maxy, long };
        }
      }
    }
    if (!best) return null;
    // PCA 主軸,量取沿主軸的實際長度(容許尺略為傾斜)
    const cx = best.sx / best.count, cy = best.sy / best.count;
    let cxx = 0, cyy = 0, cxy = 0;
    for (const i of best.idxs) {
      const dx = (i % w) - cx, dy = ((i / w) | 0) - cy;
      cxx += dx * dx; cyy += dy * dy; cxy += dx * dy;
    }
    const ang = 0.5 * Math.atan2(2 * cxy, cxx - cyy);
    const ux = Math.cos(ang), uy = Math.sin(ang);
    let tmin = Infinity, tmax = -Infinity;
    for (const i of best.idxs) {
      const t = (i % w) * ux + ((i / w) | 0) * uy;
      if (t < tmin) tmin = t;
      if (t > tmax) tmax = t;
    }
    const extent = tmax - tmin;
    const tc = cx * ux + cy * uy;
    const e1 = { x: (cx + (tmin - tc) * ux) / af, y: (cy + (tmin - tc) * uy) / af };
    const e2 = { x: (cx + (tmax - tc) * ux) / af, y: (cy + (tmax - tc) * uy) / af };
    return {
      lenOrigPx: extent / af,
      endpoints: [e1, e2],
      bbox: { minx: best.minx, maxx: best.maxx, miny: best.miny, maxy: best.maxy }
    };
  }

  // 自動偵測所有封閉黑/藍框
  function autoDetectFrames() {
    for (const color of ['black', 'blue']) {
      let bestSet = null, bestT = 0;
      for (const t of [30, 50, 70, 90]) {
        const set = enclosedComponents(color, t);
        if (set.length > 6) continue;   // 過多視為雜訊
        if (set.length && (!bestSet || set.length > bestSet.length)) { bestSet = set; bestT = t; }
      }
      if (bestSet) {
        for (const r of bestSet) addRegion(r.idxs, r.count, r.sx, r.sy, color === 'black' ? '黑框' : '藍框');
      }
    }
    // 依畫面位置(由左至右)排序
    regions.sort((a, b) => a.cx - b.cx);
  }

  // 標記牆(框線)像素
  function buildWall(color, t) {
    const { data, w, h } = analysis;
    const N = w * h;
    const wall = scratch.wall;
    if (color === 'black') {
      const thr = 30 + t * 1.5;
      for (let i = 0, q = 0; i < N; i++, q += 4) {
        wall[i] = (data[q] < thr && data[q + 1] < thr && data[q + 2] < thr) ? 1 : 0;
      }
    } else {
      const dr = 70 - t * 0.6, dg = 50 - t * 0.5;
      for (let i = 0, q = 0; i < N; i++, q += 4) {
        const b = data[q + 2];
        wall[i] = (b > 60 && (b - data[q]) > dr && (b - data[q + 1]) > dg) ? 1 : 0;
      }
    }
  }

  // 從影像邊界淹水標記「外部」
  function floodOutside() {
    const { w, h } = analysis;
    const { wall, outside, stack } = scratch;
    outside.fill(0);
    let sp = 0, j;
    for (let x = 0; x < w; x++) {
      j = x; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; }
      j = (h - 1) * w + x; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; }
    }
    for (let y = 0; y < h; y++) {
      j = y * w; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; }
      j = y * w + w - 1; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; }
    }
    while (sp > 0) {
      const i = stack[--sp], x = i % w, y = (i / w) | 0;
      if (x > 0) { j = i - 1; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; } }
      if (x < w - 1) { j = i + 1; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; } }
      if (y > 0) { j = i - w; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; } }
      if (y < h - 1) { j = i + w; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; } }
    }
  }

  // 找出所有封閉區域(非外部的連通塊 = 框線+框內)
  function enclosedComponents(color, t) {
    const { w, h } = analysis;
    const N = w * h;
    buildWall(color, t);
    floodOutside();
    const { outside, comp, stack } = scratch;
    comp.fill(0);
    const minA = Math.max(300, N * 0.001);
    const out = [];
    for (let start = 0; start < N; start++) {
      if (outside[start] || comp[start]) continue;
      let sp = 0, count = 0, sx = 0, sy = 0, touch = false;
      comp[start] = 1; stack[sp++] = start;
      const idxs = [];
      while (sp > 0) {
        const i = stack[--sp], x = i % w, y = (i / w) | 0;
        count++; sx += x; sy += y; idxs.push(i);
        if (x === 0 || y === 0 || x === w - 1 || y === h - 1) touch = true;
        let j;
        if (x > 0) { j = i - 1; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp++] = j; } }
        if (x < w - 1) { j = i + 1; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp++] = j; } }
        if (y > 0) { j = i - w; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp++] = j; } }
        if (y < h - 1) { j = i + w; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp++] = j; } }
      }
      if (touch || count < minA || count > 0.5 * N) continue;
      const ccx = sx / count, ccy = sy / count;
      if (rulerBox && ccx >= rulerBox.minx && ccx <= rulerBox.maxx && ccy >= rulerBox.miny && ccy <= rulerBox.maxy) continue;
      out.push({ idxs, count, sx, sy });
    }
    return out;
  }

  function addRegion(idxs, count, sx, sy, label) {
    const { w, h, af } = analysis;
    const palIdx = nextPal++;
    const col = hexToRgb(PALETTE[palIdx % PALETTE.length]);
    const over = document.createElement('canvas');
    over.width = w; over.height = h;
    const octx = over.getContext('2d');
    const idata = octx.createImageData(w, h);
    const d = idata.data;
    for (const i of idxs) {
      const q = i * 4;
      d[q] = col.r; d[q + 1] = col.g; d[q + 2] = col.b; d[q + 3] = 110;
    }
    octx.putImageData(idata, 0, 0);
    regions.push({
      overlay: over, octx, pxArea: count / (af * af), label, palIdx,
      cx: (sx / count) / af, cy: (sy / count) / af
    });
  }

  // ===== 手動輔助:點框內補偵測 / 點已偵測的框移除 / 手動標尺 =====
  function toImgCoords(evt) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (evt.clientX - rect.left) / rect.width * canvas.width,
      y: (evt.clientY - rect.top) / rect.height * canvas.height
    };
  }

  canvas.addEventListener('click', evt => {
    if (!img) return;
    const p = toImgCoords(evt);
    if (mode === 'calib') {
      if (calibPts.length >= 2) calibPts = [];
      calibPts.push(p);
      if (calibPts.length === 2) {
        const d = Math.hypot(calibPts[0].x - calibPts[1].x, calibPts[0].y - calibPts[1].y);
        if (d >= 2) {
          rulerPx = d; rulerAuto = false;
          cmPerPx = knownLen / rulerPx;
          mode = null;
        }
      }
      refresh();
      return;
    }
    // 點在已偵測的框上 → 移除該框
    const { af } = analysis;
    const ax = Math.round(p.x * af), ay = Math.round(p.y * af);
    for (let k = regions.length - 1; k >= 0; k--) {
      if (regions[k].octx.getImageData(ax, ay, 1, 1).data[3] > 0) {
        regions.splice(k, 1);
        refresh();
        return;
      }
    }
    // 否則嘗試在點擊處補偵測一個框
    detectAt(ax, ay);
  });

  function detectAt(ax, ay) {
    const { w, h } = analysis;
    if (ax < 0 || ay < 0 || ax >= w || ay >= h) return;
    let best = null;
    for (const color of ['black', 'blue']) {
      for (const t of [30, 50, 70, 90]) {
        buildWall(color, t);
        floodOutside();
        const { outside, comp, stack } = scratch;
        const seed = ay * w + ax;
        if (outside[seed]) continue;
        comp.fill(0);
        let sp = 0, count = 0, sx = 0, sy = 0, touch = false;
        comp[seed] = 1; stack[sp++] = seed;
        const idxs = [];
        while (sp > 0) {
          const i = stack[--sp], x = i % w, y = (i / w) | 0;
          count++; sx += x; sy += y; idxs.push(i);
          if (x === 0 || y === 0 || x === w - 1 || y === h - 1) touch = true;
          let j;
          if (x > 0) { j = i - 1; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp++] = j; } }
          if (x < w - 1) { j = i + 1; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp++] = j; } }
          if (y > 0) { j = i - w; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp++] = j; } }
          if (y < h - 1) { j = i + w; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp++] = j; } }
        }
        if (touch || count < 20 || count > 0.92 * w * h) continue;
        if (!best || count < best.count) best = { idxs, count, sx, sy, color };
      }
    }
    if (!best) { lastMsg = '這裡偵測不到封閉的黑/藍框'; refresh(); return; }
    addRegion(best.idxs, best.count, best.sx, best.sy, best.color === 'black' ? '黑框' : '藍框');
    regions.sort((a, b) => a.cx - b.cx);
    lastMsg = '';
    refresh();
  }

  // ===== UI =====
  function updateGuide() {
    guide.classList.remove('calib', 'done');
    if (!img) {
      guideBadge.textContent = '1';
      guideText.textContent = '載入照片後自動偵測尺與框框,直接顯示面積';
      return;
    }
    if (mode === 'calib') {
      guide.classList.add('calib');
      guideBadge.textContent = '📏';
      const n = calibPts.length;
      guideText.innerHTML =
        (rulerPx === null && !rulerAuto ? '自動偵測不到尺 — ' : '') +
        `請點一下尺的<b>${n === 0 ? '起點' : n === 1 ? '終點' : '兩端'}</b>,尺長 = ` +
        `<input id="lenInline" class="len-inline" type="number" min="0.1" step="0.1" value="${knownLen}"> cm`;
      bindLenInput();
      return;
    }
    guide.classList.add('done');
    guideBadge.textContent = '✓';
    const rulerNote = rulerAuto
      ? `尺:自動偵測(整支 = <input id="lenInline" class="len-inline" type="number" min="0.1" step="0.1" value="${knownLen}"> cm)`
      : `尺:手動標記(<input id="lenInline" class="len-inline" type="number" min="0.1" step="0.1" value="${knownLen}"> cm)`;
    guideText.innerHTML =
      (lastMsg ? `<span style="color:var(--danger)">${lastMsg}</span> · ` : '') +
      `已偵測 <b>${regions.length}</b> 個框 · ${rulerNote}` +
      ` · <span class="glink" id="linkManual">手動標尺</span>` +
      ` · <span class="glink" id="linkReset">重新分析</span>` +
      `<br><span style="font-size:12px;color:var(--muted)">沒抓到的框可直接點框內補偵測;點已偵測的框可移除。自動尺長若不準,請用「手動標尺」點尺上兩個刻度。</span>`;
    bindLenInput();
    const lm = document.getElementById('linkManual');
    if (lm) lm.addEventListener('click', () => { calibPts = []; mode = 'calib'; refresh(); });
    const lr = document.getElementById('linkReset');
    if (lr) lr.addEventListener('click', () => { autoAnalyze(); refresh(); });
  }

  function bindLenInput() {
    const el = document.getElementById('lenInline');
    if (!el) return;
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      if (v > 0) {
        knownLen = v;
        if (rulerPx) cmPerPx = knownLen / rulerPx;
        updateResults();
        updateCalibStatus();
      }
    });
    el.addEventListener('click', e => e.stopPropagation());
  }

  function updateCalibStatus() {
    if (!img) { calibStatus.textContent = '尚未載入照片'; return; }
    if (!cmPerPx) { calibStatus.textContent = '尚未取得比例 — 請依上方提示標記尺'; return; }
    calibStatus.innerHTML =
      `比例:<b>${knownLen} cm</b> = ${rulerPx.toFixed(1)} px(${rulerAuto ? '自動偵測' : '手動標記'})<br>` +
      `<b>${(cmPerPx * 10).toFixed(4)}</b> mm/px`;
  }

  function refresh() { updateResults(); updateGuide(); updateCalibStatus(); redraw(); }

  function areaOf(rg) { return cmPerPx ? rg.pxArea * cmPerPx * cmPerPx : null; }

  function updateResults() {
    regionList.innerHTML = '';
    if (!regions.length) regionList.innerHTML = '<div class="region-empty">尚無偵測到的框</div>';
    let total = 0, hasAny = false;
    regions.forEach((rg, idx) => {
      const a = areaOf(rg);
      const color = PALETTE[rg.palIdx % PALETTE.length];
      const div = document.createElement('div');
      div.className = 'region-item';
      let valHtml;
      if (a == null) {
        valHtml = `<span class="rval" style="color:var(--muted);font-size:13px">待標尺</span>`;
      } else {
        hasAny = true; total += a;
        valHtml = `<span class="rval" style="color:${color}">${a.toFixed(2)}<span class="runit"> cm²</span></span>`;
      }
      div.innerHTML =
        `<span class="swatch" style="background:${color}"></span>` +
        `<span class="rlabel">框 ${idx + 1}(${rg.label})</span>` + valHtml +
        `<button class="rdel" data-i="${idx}" title="刪除">✕</button>`;
      regionList.appendChild(div);
    });
    regionList.querySelectorAll('.rdel').forEach(b => {
      b.addEventListener('click', () => { regions.splice(parseInt(b.dataset.i), 1); refresh(); });
    });
    if (hasAny) {
      let sub = `${(total * 100).toFixed(1)} mm²`;
      if (total >= 100) sub = `${(total / 10000).toFixed(4)} m² · ` + sub;
      totalVal.innerHTML = `${total.toFixed(2)}<div class="unit" style="margin-top:2px">${sub}</div>`;
    } else {
      totalVal.textContent = '—';
    }
    updateGrafts(total, hasAny);
  }

  function updateGrafts(totalArea, hasAny) {
    graftList.innerHTML = '';
    if (!regions.length || !hasAny) {
      graftList.innerHTML = '<div class="region-empty">偵測到框後自動估算</div>';
      graftVal.textContent = '—';
      return;
    }
    regions.forEach((rg, idx) => {
      const a = areaOf(rg);
      if (a == null) return;
      const color = PALETTE[rg.palIdx % PALETTE.length];
      const n = Math.round(a * density);
      const div = document.createElement('div');
      div.className = 'graft-row';
      div.innerHTML =
        `<span class="swatch" style="background:${color}"></span>` +
        `<span>框 ${idx + 1}:${a.toFixed(1)} cm² × ${density}</span>` +
        `<span class="gval" style="color:${color}">${n.toLocaleString()} 株</span>`;
      graftList.appendChild(div);
    });
    const totalGrafts = Math.round(totalArea * density);
    graftVal.innerHTML =
      `${totalGrafts.toLocaleString()}<div class="unit" style="margin-top:2px">${totalArea.toFixed(2)} cm² × ${density} 株/cm²</div>`;
  }

  function redraw() {
    if (!img) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    ctx.imageSmoothingEnabled = false;
    const s = 1 / scale;
    regions.forEach((rg, idx) => {
      ctx.drawImage(rg.overlay, 0, 0, canvas.width, canvas.height);
      ctx.font = `bold ${18 * s}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.lineWidth = 4 * s; ctx.strokeStyle = 'rgba(0,0,0,.75)';
      ctx.strokeText(String(idx + 1), rg.cx, rg.cy);
      ctx.fillStyle = PALETTE[rg.palIdx % PALETTE.length];
      ctx.fillText(String(idx + 1), rg.cx, rg.cy);
    });
    if (calibPts.length) {
      ctx.strokeStyle = '#ffcc33';
      ctx.lineWidth = 3 * s;
      if (calibPts.length === 2) {
        ctx.beginPath();
        ctx.moveTo(calibPts[0].x, calibPts[0].y);
        ctx.lineTo(calibPts[1].x, calibPts[1].y);
        ctx.stroke();
      }
      calibPts.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 6 * s, 0, Math.PI * 2);
        ctx.fillStyle = '#ffcc33'; ctx.fill();
        ctx.lineWidth = 1.5 * s; ctx.strokeStyle = '#000'; ctx.stroke();
      });
    }
  }

  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  densityGrid.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      density = parseInt(b.dataset.d);
      densityGrid.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      updateResults();
    });
  });

  window.addEventListener('resize', () => { if (img) { setupCanvas(); redraw(); } });
})();
</script>
</body>
</html>
