<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平面面積計算器</title>
<style>
  :root {
    --bg: #0f1115; --panel: #1a1d24; --panel-2: #232733; --border: #333846;
    --text: #e6e9ef; --muted: #9aa3b2; --accent: #4f9dff; --accent-2: #2ecc71;
    --danger: #ff5c5c; --ruler: #ffcc33;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
  }
  header { padding: 16px 20px; background: var(--panel); border-bottom: 1px solid var(--border); }
  header h1 { margin: 0; font-size: 18px; }
  header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
  .wrap { display: flex; gap: 16px; padding: 16px; flex-wrap: wrap; }
  .sidebar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .card h2 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .canvas-area {
    flex: 1; min-width: 320px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 10px;
  }
  .guide {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--border); font-size: 15px; line-height: 1.4;
  }
  .guide .badge {
    display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px;
    border-radius: 50%; flex-shrink: 0; background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
  }
  .guide.calib { border-color: var(--ruler); }
  .guide.calib .badge { background: var(--ruler); color: #3a2e00; }
  .guide.detect { border-color: var(--accent-2); }
  .guide.detect .badge { background: var(--accent-2); color: #06341c; }
  .guide .len-inline {
    width: 62px; padding: 4px 6px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; text-align: center;
  }
  #stage-wrap {
    position: relative; width: 100%; overflow: auto; background: #000; border-radius: 8px;
    display: flex; justify-content: center; align-items: center; min-height: 300px;
  }
  canvas { display: block; max-width: 100%; touch-action: none; cursor: crosshair; }
  .empty-hint { color: var(--muted); padding: 60px 20px; text-align: center; font-size: 14px; }
  button {
    font-family: inherit; font-size: 14px; border: none; border-radius: 8px; padding: 9px 12px;
    cursor: pointer; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); transition: .15s;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .file-btn {
    display: block; text-align: center; background: var(--panel-2); border: 1px dashed var(--border);
    border-radius: 8px; padding: 14px; cursor: pointer; color: var(--muted); font-size: 14px;
  }
  .file-btn:hover { border-color: var(--accent); color: var(--text); }
  input[type="file"] { display: none; }
  label.small { font-size: 12px; color: var(--muted); display: block; margin: 12px 0 6px; }
  input[type="range"] { width: 100%; }
  .status { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 10px; }
  .status b { color: var(--text); }
  .status.warn { color: var(--danger); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .region-item {
    display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 8px; background: var(--panel-2);
  }
  .region-item .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(0,0,0,.4); }
  .region-item .rlabel { font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .region-item .rval { font-size: 16px; font-weight: 700; margin-left: auto; }
  .region-item .runit { font-size: 11px; color: var(--muted); }
  .region-item .rdel { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 6px; font-size: 14px; }
  .region-item .rdel:hover { color: var(--danger); }
  .region-empty { font-size: 13px; color: var(--muted); padding: 4px 2px; }
  .total {
    margin-top: 6px; padding: 12px; border-radius: 10px; text-align: center;
    background: linear-gradient(135deg, #16351f, #1a1d24); border: 1px solid #2c6e49;
  }
  .total .val { font-size: 24px; font-weight: 800; color: var(--accent-2); }
  .total .unit { font-size: 12px; color: var(--muted); }
  .density-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .density-grid button { padding: 8px 0; font-size: 14px; }
  .density-grid button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .graft-row {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px;
    background: var(--panel-2); font-size: 13px;
  }
  .graft-row .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .graft-row .gval { margin-left: auto; font-weight: 700; }
  .total.graft {
    background: linear-gradient(135deg, #142a45, #1a1d24); border: 1px solid #2c5a8f;
  }
  .total.graft .val { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>📐 平面面積計算器</h1>
  <p>拍照時把尺一起拍進去 → 點尺兩端定比例 → 點一下黑/藍框內部,自動算出框內面積</p>
</header>

<div class="wrap">
  <div class="sidebar">
    <div class="card">
      <h2>載入照片</h2>
      <label class="file-btn" for="file">📷 選擇 / 拍攝照片</label>
      <input type="file" id="file" accept="image/*">
      <div class="hint">照片裡要有一把尺,以及用黑色或藍色畫出的封閉框線(和待測物同一平面)。盡量正對拍攝以減少透視誤差。</div>
    </div>

    <div class="card">
      <h2>操作</h2>
      <div class="btn-row">
        <button id="btnRecalib" disabled>🎯 重新標記尺</button>
        <button id="btnUndo" disabled>↩︎ 移除上一個框</button>
      </div>
      <div class="btn-row" style="margin-top:8px">
        <button id="btnClearAll" disabled>🗑 全部清除</button>
      </div>
      <div class="status" id="calibStatus">尚未載入照片</div>
    </div>

    <div class="card">
      <h2>面積結果</h2>
      <div id="regionList"><div class="region-empty">尚無框選區域</div></div>
      <div class="total">
        <div class="val" id="totalVal">—</div>
        <div class="unit">總面積 cm²</div>
      </div>
    </div>

    <div class="card">
      <h2>植髮數量計算</h2>
      <label class="small" style="margin-top:0">植髮密度(株 / cm²)</label>
      <div class="density-grid" id="densityGrid">
        <button data-d="30">30</button>
        <button data-d="40">40</button>
        <button data-d="50" class="active">50</button>
        <button data-d="60">60</button>
        <button data-d="70">70</button>
        <button data-d="80">80</button>
        <button data-d="90">90</button>
      </div>
      <div id="graftList" style="margin-top:10px"><div class="region-empty">先框選區域,即可估算株數</div></div>
      <div class="total graft">
        <div class="val" id="graftVal">—</div>
        <div class="unit">預估需要植髮株數</div>
      </div>
    </div>
  </div>

  <div class="canvas-area">
    <div class="guide" id="guide">
      <span class="badge" id="guideBadge">1</span>
      <span id="guideText">先載入一張照片(記得把尺一起拍進去)</span>
    </div>
    <div id="stage-wrap">
      <div class="empty-hint" id="emptyHint">請先於左側載入一張照片 👈</div>
      <canvas id="canvas" style="display:none"></canvas>
    </div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const fileInput = document.getElementById('file');
  const emptyHint = document.getElementById('emptyHint');
  const btnRecalib = document.getElementById('btnRecalib');
  const btnUndo = document.getElementById('btnUndo');
  const btnClearAll = document.getElementById('btnClearAll');
  const calibStatus = document.getElementById('calibStatus');
  const regionList = document.getElementById('regionList');
  const totalVal = document.getElementById('totalVal');
  const guide = document.getElementById('guide');
  const guideBadge = document.getElementById('guideBadge');
  const guideText = document.getElementById('guideText');
  const densityGrid = document.getElementById('densityGrid');
  const graftList = document.getElementById('graftList');
  const graftVal = document.getElementById('graftVal');

  const PALETTE = ['#2ecc71', '#4f9dff', '#ff8c42', '#c77dff', '#ff5c8a', '#43d9c9', '#f4d35e', '#a0e548'];
  const DEFAULT_LEN = 15;
  const MAX_ANALYSIS = 1400;   // 偵測用縮圖最長邊

  let img = null;
  let scale = 1;               // 顯示縮放
  let mode = null;             // 'calib' | 'detect'
  let calibPts = [];           // 原始像素座標
  let cmPerPx = null;          // 每「原始像素」代表幾公分
  let knownLen = DEFAULT_LEN;
  let analysis = null;         // {data, w, h, af}  af = 縮圖/原圖 比例
  let scratch = null;          // 偵測用重複使用緩衝區
  let regions = [];            // {overlay, areaCm2, label, palIdx, cx, cy}
  let lastMsg = '';
  let density = 50;            // 植髮密度(株/cm²)

  fileInput.addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const url = URL.createObjectURL(f);
    const im = new Image();
    im.onload = () => {
      img = im;
      setupCanvas();
      buildAnalysis();
      calibPts = []; cmPerPx = null; regions = []; mode = 'calib'; lastMsg = '';
      refresh();
      URL.revokeObjectURL(url);
    };
    im.src = url;
  });

  function setupCanvas() {
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    emptyHint.style.display = 'none';
    canvas.style.display = 'block';
    const wrap = document.getElementById('stage-wrap');
    const maxW = wrap.clientWidth - 4;
    const dispW = Math.min(img.naturalWidth, maxW);
    scale = dispW / img.naturalWidth;
    canvas.style.width = dispW + 'px';
    canvas.style.height = (img.naturalHeight * scale) + 'px';
  }

  function buildAnalysis() {
    const ow = img.naturalWidth, oh = img.naturalHeight;
    const af = Math.min(1, MAX_ANALYSIS / Math.max(ow, oh));
    const w = Math.max(1, Math.round(ow * af));
    const h = Math.max(1, Math.round(oh * af));
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    const o = off.getContext('2d');
    o.drawImage(img, 0, 0, w, h);
    analysis = { data: o.getImageData(0, 0, w, h).data, w, h, af };
    const N = w * h;   // 偵測用緩衝區,一次配置重複使用
    scratch = { wall: new Uint8Array(N), outside: new Uint8Array(N), comp: new Uint8Array(N), stack: new Int32Array(N) };
  }

  function toImgCoords(evt) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (evt.clientX - rect.left) / rect.width * canvas.width,
      y: (evt.clientY - rect.top) / rect.height * canvas.height
    };
  }

  canvas.addEventListener('click', evt => {
    if (!img || !mode) return;
    const p = toImgCoords(evt);
    if (mode === 'calib') {
      if (calibPts.length >= 2) calibPts = [];
      calibPts.push(p);
      if (calibPts.length === 2) {
        computeCalibration();
        if (cmPerPx) { mode = 'detect'; lastMsg = ''; }
      }
      refresh();
    } else if (mode === 'detect') {
      detectAt(p);
    }
  });

  function computeCalibration() {
    const [a, b] = calibPts;
    const distPx = Math.hypot(a.x - b.x, a.y - b.y);
    if (!knownLen || knownLen <= 0 || distPx < 2) {
      cmPerPx = null;
      calibStatus.innerHTML = '<span style="color:var(--danger)">校正失敗,請重新標記</span>';
      return;
    }
    cmPerPx = knownLen / distPx;
    calibStatus.innerHTML =
      `已校正:<b>${knownLen} cm</b> = ${distPx.toFixed(1)} px<br>比例:<b>${(cmPerPx * 10).toFixed(4)}</b> mm/px`;
  }

  // 以指定框線顏色/容差找出點擊處的封閉區域;失敗回傳 null(熱迴圈全部內聯以求速度)
  function tryEnclosure(color, t, ax, ay) {
    const { data, w, h } = analysis;
    const N = w * h;
    const { wall, outside, comp, stack } = scratch;
    // 標記「牆」(框線)像素
    if (color === 'black') {
      const thr = 30 + t * 1.5;                 // 亮度門檻，容差越大越寬
      for (let i = 0, q = 0; i < N; i++, q += 4) {
        wall[i] = (data[q] < thr && data[q + 1] < thr && data[q + 2] < thr) ? 1 : 0;
      }
    } else {
      const dr = 70 - t * 0.6, dg = 50 - t * 0.5;
      for (let i = 0, q = 0; i < N; i++, q += 4) {
        const b = data[q + 2];
        wall[i] = (b > 60 && (b - data[q]) > dr && (b - data[q + 1]) > dg) ? 1 : 0;
      }
    }
    // 從影像邊界沿「非框線」淹水 → 標記外部
    outside.fill(0);
    let sp = 0, j;
    for (let x = 0; x < w; x++) {
      j = x; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; }
      j = (h - 1) * w + x; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; }
    }
    for (let y = 0; y < h; y++) {
      j = y * w; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; }
      j = y * w + w - 1; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; }
    }
    while (sp > 0) {
      const i = stack[--sp], x = i % w, y = (i / w) | 0;
      if (x > 0) { j = i - 1; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; } }
      if (x < w - 1) { j = i + 1; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; } }
      if (y > 0) { j = i - w; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; } }
      if (y < h - 1) { j = i + w; if (!wall[j] && !outside[j]) { outside[j] = 1; stack[sp++] = j; } }
    }
    const seed = ay * w + ax;
    if (outside[seed]) return null;
    // 從點擊處在「非外部」像素中取連通塊 = 框線 + 框內(含內部物件)
    comp.fill(0);
    let sp2 = 0; comp[seed] = 1; stack[sp2++] = seed;
    let count = 0, sx = 0, sy = 0;
    while (sp2 > 0) {
      const i = stack[--sp2], x = i % w, y = (i / w) | 0;
      count++; sx += x; sy += y;
      if (x > 0) { j = i - 1; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp2++] = j; } }
      if (x < w - 1) { j = i + 1; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp2++] = j; } }
      if (y > 0) { j = i - w; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp2++] = j; } }
      if (y < h - 1) { j = i + w; if (!outside[j] && !comp[j]) { comp[j] = 1; stack[sp2++] = j; } }
    }
    if (count > 0.92 * N || count < 20) return null;
    return { comp: comp.slice(), count, sx, sy };   // comp 是共用緩衝區,須複製
  }

  // 點框內 → 自動嘗試黑/藍框線與多組容差,取最緊密的封閉區域
  function detectAt(p) {
    if (!analysis || !cmPerPx) return;
    const { w, h, af } = analysis;
    const ax = Math.round(p.x * af), ay = Math.round(p.y * af);
    if (ax < 0 || ay < 0 || ax >= w || ay >= h) return;
    let best = null;
    for (const color of ['black', 'blue']) {
      for (const t of [30, 50, 70, 90]) {
        const r = tryEnclosure(color, t, ax, ay);
        if (r && (!best || r.count < best.count)) best = { ...r, color };
      }
    }
    if (!best) { fail('這裡偵測不到封閉的黑/藍框 — 請點框「內部」,並確認框線閉合、清晰'); return; }
    const { comp, count, sx, sy, color: hitColor } = best;
    const N = w * h;

    // 面積:每個縮圖像素 = (1/af)^2 個原始像素
    const areaCm2 = count * (1 / (af * af)) * cmPerPx * cmPerPx;

    // 疊圖(縮圖尺寸,之後放大顯示)
    const palIdx = regions.length;
    const col = hexToRgb(PALETTE[palIdx % PALETTE.length]);
    const over = document.createElement('canvas');
    over.width = w; over.height = h;
    const octx = over.getContext('2d');
    const idata = octx.createImageData(w, h);
    for (let i = 0; i < N; i++) {
      if (comp[i]) {
        const q = i * 4;
        idata.data[q] = col.r; idata.data[q + 1] = col.g; idata.data[q + 2] = col.b; idata.data[q + 3] = 110;
      }
    }
    octx.putImageData(idata, 0, 0);

    regions.push({
      overlay: over, areaCm2, palIdx,
      label: hitColor === 'black' ? '黑框' : '藍框',
      cx: (sx / count) / af, cy: (sy / count) / af
    });
    lastMsg = '';
    refresh();
  }

  function fail(msg) { lastMsg = msg; refresh(); }

  function updateGuide() {
    guide.classList.remove('calib', 'detect');
    if (!img) {
      guideBadge.textContent = '1';
      guideText.textContent = '先載入一張照片(記得把尺一起拍進去)';
    } else if (mode === 'calib') {
      guide.classList.add('calib');
      guideBadge.textContent = '2';
      const n = calibPts.length;
      guideText.innerHTML =
        `點一下尺的<b>${n === 0 ? '起點' : n === 1 ? '終點' : '兩端'}</b>,尺長 = ` +
        `<input id="lenInline" class="len-inline" type="number" min="0.1" step="0.1" value="${knownLen}"> cm` +
        (n === 1 ? '　<span style="color:var(--muted)">(再點另一端)</span>' : '');
      bindLenInput();
    } else if (mode === 'detect') {
      guide.classList.add('detect');
      guideBadge.textContent = '3';
      if (lastMsg) {
        guideText.innerHTML = `<span style="color:var(--danger)">${lastMsg}</span>`;
      } else {
        guideText.innerHTML =
          `點一下<b>黑框或藍框內部</b>,自動辨識框線並算出面積 · 可連續點多個框`;
      }
    }
  }

  function bindLenInput() {
    const el = document.getElementById('lenInline');
    if (!el) return;
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      if (v > 0) {
        knownLen = v;
        if (calibPts.length === 2) computeCalibration();
        updateResults();
      }
    });
    el.addEventListener('click', e => e.stopPropagation());
  }

  function refresh() { updateButtons(); updateResults(); updateGuide(); redraw(); }

  function updateResults() {
    regionList.innerHTML = '';
    if (!regions.length) regionList.innerHTML = '<div class="region-empty">尚無框選區域</div>';
    let total = 0;
    regions.forEach((rg, idx) => {
      total += rg.areaCm2;
      const color = PALETTE[rg.palIdx % PALETTE.length];
      const div = document.createElement('div');
      div.className = 'region-item';
      div.innerHTML =
        `<span class="swatch" style="background:${color}"></span>` +
        `<span class="rlabel">框 ${idx + 1}(${rg.label})</span>` +
        `<span class="rval" style="color:${color}">${rg.areaCm2.toFixed(2)}<span class="runit"> cm²</span></span>` +
        `<button class="rdel" data-i="${idx}" title="刪除">✕</button>`;
      regionList.appendChild(div);
    });
    regionList.querySelectorAll('.rdel').forEach(b => {
      b.addEventListener('click', () => { regions.splice(parseInt(b.dataset.i), 1); reindex(); refresh(); });
    });
    if (regions.length) {
      let sub = `${(total * 100).toFixed(1)} mm²`;
      if (total >= 100) sub = `${(total / 10000).toFixed(4)} m² · ` + sub;
      totalVal.innerHTML = `${total.toFixed(2)}<div class="unit" style="margin-top:2px">${sub}</div>`;
    } else {
      totalVal.textContent = '—';
    }
    updateGrafts(total);
  }

  function updateGrafts(totalArea) {
    graftList.innerHTML = '';
    if (!regions.length) {
      graftList.innerHTML = '<div class="region-empty">先框選區域,即可估算株數</div>';
      graftVal.textContent = '—';
      return;
    }
    regions.forEach((rg, idx) => {
      const color = PALETTE[rg.palIdx % PALETTE.length];
      const n = Math.round(rg.areaCm2 * density);
      const div = document.createElement('div');
      div.className = 'graft-row';
      div.innerHTML =
        `<span class="swatch" style="background:${color}"></span>` +
        `<span>框 ${idx + 1}:${rg.areaCm2.toFixed(1)} cm² × ${density}</span>` +
        `<span class="gval" style="color:${color}">${n.toLocaleString()} 株</span>`;
      graftList.appendChild(div);
    });
    const totalGrafts = Math.round(totalArea * density);
    graftVal.innerHTML =
      `${totalGrafts.toLocaleString()}<div class="unit" style="margin-top:2px">${totalArea.toFixed(2)} cm² × ${density} 株/cm²</div>`;
  }

  function reindex() { regions.forEach((rg, i) => rg.palIdx = i); }

  function redraw() {
    if (!img) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    ctx.imageSmoothingEnabled = false;
    const s = 1 / scale;
    regions.forEach((rg, idx) => {
      ctx.drawImage(rg.overlay, 0, 0, canvas.width, canvas.height);
      ctx.font = `bold ${18 * s}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.lineWidth = 4 * s; ctx.strokeStyle = 'rgba(0,0,0,.75)';
      ctx.strokeText(String(idx + 1), rg.cx, rg.cy);
      ctx.fillStyle = PALETTE[rg.palIdx % PALETTE.length];
      ctx.fillText(String(idx + 1), rg.cx, rg.cy);
    });
    // 校正尺線
    if (calibPts.length) {
      ctx.strokeStyle = '#ffcc33';
      ctx.lineWidth = 3 * s;
      if (calibPts.length === 2) {
        ctx.beginPath();
        ctx.moveTo(calibPts[0].x, calibPts[0].y);
        ctx.lineTo(calibPts[1].x, calibPts[1].y);
        ctx.stroke();
      }
      calibPts.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 6 * s, 0, Math.PI * 2);
        ctx.fillStyle = '#ffcc33'; ctx.fill();
        ctx.lineWidth = 1.5 * s; ctx.strokeStyle = '#000'; ctx.stroke();
      });
    }
  }

  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  // 植髮密度選擇
  densityGrid.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      density = parseInt(b.dataset.d);
      densityGrid.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      updateResults();
    });
  });

  btnRecalib.addEventListener('click', () => { calibPts = []; cmPerPx = null; mode = 'calib'; lastMsg = ''; refresh(); });
  btnUndo.addEventListener('click', () => { regions.pop(); reindex(); refresh(); });
  btnClearAll.addEventListener('click', () => { regions = []; refresh(); });

  function updateButtons() {
    const has = !!img;
    btnRecalib.disabled = !has;
    btnUndo.disabled = regions.length === 0;
    btnClearAll.disabled = regions.length === 0;
    if (!has) calibStatus.textContent = '尚未載入照片';
    else if (!cmPerPx) calibStatus.textContent = '請依上方提示點尺的兩端';
  }

  window.addEventListener('resize', () => { if (img) { setupCanvas(); redraw(); } });
})();
</script>
</body>
</html>
