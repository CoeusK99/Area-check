<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平面面積計算器</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --panel-2: #232733;
    --border: #333846;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #4f9dff;
    --accent-2: #2ecc71;
    --danger: #ff5c5c;
    --ruler: #ffcc33;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 16px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 18px; }
  header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
  .wrap { display: flex; gap: 16px; padding: 16px; flex-wrap: wrap; }
  .sidebar {
    width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
  }
  .card h2 {
    margin: 0 0 10px; font-size: 13px; text-transform: uppercase;
    letter-spacing: .5px; color: var(--muted);
  }
  .canvas-area {
    flex: 1; min-width: 320px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 12px; padding: 10px;
    display: flex; flex-direction: column; align-items: stretch; gap: 10px;
  }
  /* 大引導帶 */
  .guide {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--border);
    font-size: 15px; line-height: 1.4;
  }
  .guide .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
  }
  .guide.calib { border-color: var(--ruler); }
  .guide.calib .badge { background: var(--ruler); color: #3a2e00; }
  .guide.draw { border-color: var(--accent-2); }
  .guide.draw .badge { background: var(--accent-2); color: #06341c; }
  .guide .len-inline {
    width: 62px; padding: 4px 6px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; text-align: center;
  }
  #stage-wrap {
    position: relative; width: 100%; overflow: auto; background: #000;
    border-radius: 8px; display: flex; justify-content: center; align-items: center;
    min-height: 300px;
  }
  canvas { display: block; max-width: 100%; touch-action: none; cursor: crosshair; }
  .empty-hint { color: var(--muted); padding: 60px 20px; text-align: center; font-size: 14px; }
  button {
    font-family: inherit; font-size: 14px; border: none; border-radius: 8px;
    padding: 9px 12px; cursor: pointer; background: var(--panel-2);
    color: var(--text); border: 1px solid var(--border); transition: .15s;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { filter: brightness(1.1); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .file-btn {
    display: block; text-align: center; background: var(--panel-2);
    border: 1px dashed var(--border); border-radius: 8px; padding: 14px;
    cursor: pointer; color: var(--muted); font-size: 14px;
  }
  .file-btn:hover { border-color: var(--accent); color: var(--text); }
  input[type="file"] { display: none; }
  .status { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .status b { color: var(--text); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  .region-item {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
    background: var(--panel-2);
  }
  .region-item .swatch {
    width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(0,0,0,.4);
  }
  .region-item .rlabel { font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .region-item .rval { font-size: 16px; font-weight: 700; margin-left: auto; }
  .region-item .runit { font-size: 11px; color: var(--muted); }
  .region-item .rdel {
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 2px 6px; font-size: 14px;
  }
  .region-item .rdel:hover { color: var(--danger); }
  .region-empty { font-size: 13px; color: var(--muted); padding: 4px 2px; }
  .total {
    margin-top: 6px; padding: 12px; border-radius: 10px; text-align: center;
    background: linear-gradient(135deg, #16351f, #1a1d24); border: 1px solid #2c6e49;
  }
  .total .val { font-size: 24px; font-weight: 800; color: var(--accent-2); }
  .total .unit { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>📐 平面面積計算器</h1>
  <p>拍照時把尺一起拍進去 → 點尺兩端定比例 → 框選一個或多個區域,分別算出面積</p>
</header>

<div class="wrap">
  <div class="sidebar">
    <div class="card">
      <h2>載入照片</h2>
      <label class="file-btn" for="file">📷 選擇 / 拍攝照片</label>
      <input type="file" id="file" accept="image/*">
      <div class="hint">照片裡要有一把尺(和待測物同一平面),盡量正對拍攝以減少透視誤差。載入後會依畫面上方的提示一步步進行。</div>
    </div>

    <div class="card">
      <h2>操作</h2>
      <div class="btn-row">
        <button id="btnRecalib" disabled>🎯 重新標記尺</button>
        <button id="btnFinish" disabled>✔️ 完成此框</button>
      </div>
      <div class="btn-row" style="margin-top:8px">
        <button id="btnUndo" disabled>↩︎ 退回一點</button>
        <button id="btnClearAll" disabled>🗑 全部清除</button>
      </div>
      <div class="status" id="calibStatus" style="margin-top:10px">尚未載入照片</div>
    </div>

    <div class="card">
      <h2>面積結果</h2>
      <div id="regionList"><div class="region-empty">尚無框選區域</div></div>
      <div class="total">
        <div class="val" id="totalVal">—</div>
        <div class="unit">總面積 cm²</div>
      </div>
    </div>
  </div>

  <div class="canvas-area">
    <div class="guide" id="guide">
      <span class="badge" id="guideBadge">1</span>
      <span id="guideText">先載入一張照片(記得把尺一起拍進去)</span>
    </div>
    <div id="stage-wrap">
      <div class="empty-hint" id="emptyHint">請先於左側載入一張照片 👈</div>
      <canvas id="canvas" style="display:none"></canvas>
    </div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const fileInput = document.getElementById('file');
  const emptyHint = document.getElementById('emptyHint');
  const btnRecalib = document.getElementById('btnRecalib');
  const btnFinish = document.getElementById('btnFinish');
  const btnUndo = document.getElementById('btnUndo');
  const btnClearAll = document.getElementById('btnClearAll');
  const calibStatus = document.getElementById('calibStatus');
  const regionList = document.getElementById('regionList');
  const totalVal = document.getElementById('totalVal');
  const guide = document.getElementById('guide');
  const guideBadge = document.getElementById('guideBadge');
  const guideText = document.getElementById('guideText');

  const COLORS = ['#2ecc71', '#4f9dff', '#ff8c42', '#c77dff', '#ff5c8a', '#43d9c9', '#f4d35e', '#a0e548'];
  const DEFAULT_LEN = 15;

  let img = null;
  let scale = 1;
  let mode = null;          // 'calib' | 'draw'
  let calibPts = [];        // 校正兩點 (圖片座標)
  let cmPerPx = null;       // 每像素代表幾公分
  let knownLen = DEFAULT_LEN;
  let regions = [];         // 已完成的多邊形
  let current = [];         // 進行中的多邊形

  fileInput.addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const url = URL.createObjectURL(f);
    const im = new Image();
    im.onload = () => {
      img = im;
      setupCanvas();
      calibPts = []; cmPerPx = null; regions = []; current = [];
      mode = 'calib';           // 載入後自動進入尺規校正
      refresh();
      URL.revokeObjectURL(url);
    };
    im.src = url;
  });

  function setupCanvas() {
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    emptyHint.style.display = 'none';
    canvas.style.display = 'block';
    const wrap = document.getElementById('stage-wrap');
    const maxW = wrap.clientWidth - 4;
    const dispW = Math.min(img.naturalWidth, maxW);
    scale = dispW / img.naturalWidth;
    canvas.style.width = dispW + 'px';
    canvas.style.height = (img.naturalHeight * scale) + 'px';
  }

  function toImgCoords(evt) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (evt.clientX - rect.left) / rect.width * canvas.width,
      y: (evt.clientY - rect.top) / rect.height * canvas.height
    };
  }

  canvas.addEventListener('click', evt => {
    if (!img || !mode) return;
    const p = toImgCoords(evt);
    if (mode === 'calib') {
      if (calibPts.length >= 2) calibPts = [];
      calibPts.push(p);
      if (calibPts.length === 2) {
        computeCalibration();
        if (cmPerPx) mode = 'draw';   // 校正完成 → 自動切到框選
      }
    } else if (mode === 'draw') {
      current.push(p);
    }
    refresh();
  });

  function readLenInput() {
    const el = document.getElementById('lenInline');
    if (el) {
      const v = parseFloat(el.value);
      if (v > 0) knownLen = v;
    }
  }

  function computeCalibration() {
    const [a, b] = calibPts;
    const distPx = Math.hypot(a.x - b.x, a.y - b.y);
    if (!knownLen || knownLen <= 0 || distPx < 2) {
      cmPerPx = null;
      calibStatus.innerHTML = '<span style="color:var(--danger)">校正失敗,請重新標記</span>';
      return;
    }
    cmPerPx = knownLen / distPx;
    calibStatus.innerHTML =
      `已校正:<b>${knownLen} cm</b> = ${distPx.toFixed(1)} px<br>` +
      `比例:<b>${(cmPerPx * 10).toFixed(4)}</b> mm/px`;
  }

  function polygonAreaPx(pts) {
    if (pts.length < 3) return 0;
    let s = 0;
    for (let i = 0; i < pts.length; i++) {
      const j = (i + 1) % pts.length;
      s += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
    }
    return Math.abs(s) / 2;
  }

  function areaCm2(pts) {
    if (!cmPerPx || pts.length < 3) return null;
    return polygonAreaPx(pts) * cmPerPx * cmPerPx;
  }

  function centroid(pts) {
    let x = 0, y = 0;
    pts.forEach(p => { x += p.x; y += p.y; });
    return { x: x / pts.length, y: y / pts.length };
  }

  function updateGuide() {
    guide.classList.remove('calib', 'draw');
    if (!img) {
      guideBadge.textContent = '1';
      guideText.textContent = '先載入一張照片(記得把尺一起拍進去)';
    } else if (mode === 'calib') {
      guide.classList.add('calib');
      guideBadge.textContent = '2';
      const n = calibPts.length;
      guideText.innerHTML =
        `點一下尺的<b>${n === 0 ? '起點' : n === 1 ? '終點' : '兩端'}</b>,尺長 = ` +
        `<input id="lenInline" class="len-inline" type="number" min="0.1" step="0.1" value="${knownLen}"> cm` +
        (n === 1 ? '　<span style="color:var(--muted)">(再點一下另一端)</span>' : '');
      bindLenInput();
    } else if (mode === 'draw') {
      guide.classList.add('draw');
      guideBadge.textContent = '3';
      guideText.innerHTML = current.length < 3
        ? `沿物體邊界點一圈(至少 3 點),目前 <b>${current.length}</b> 點`
        : `已框 <b>${current.length}</b> 點 → 按「<b>完成此框</b>」;要再量下一個就直接點下一區的邊界`;
    }
  }

  function bindLenInput() {
    const el = document.getElementById('lenInline');
    if (!el) return;
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      if (v > 0) {
        knownLen = v;
        if (calibPts.length === 2) computeCalibration();
        updateResults();
        redraw();
      }
    });
    el.addEventListener('click', e => e.stopPropagation());
  }

  function refresh() {
    updateButtons();
    updateResults();
    updateGuide();
    redraw();
  }

  function updateResults() {
    regionList.innerHTML = '';
    const all = regions.map((r, i) => ({ pts: r, i, done: true }));
    if (current.length) all.push({ pts: current, i: regions.length, done: false });
    if (!all.length) regionList.innerHTML = '<div class="region-empty">尚無框選區域</div>';

    let total = 0, hasAny = false;
    all.forEach(item => {
      const a = areaCm2(item.pts);
      const color = COLORS[item.i % COLORS.length];
      const div = document.createElement('div');
      div.className = 'region-item';
      let valHtml;
      if (a == null) {
        valHtml = `<span class="rval" style="color:var(--muted);font-size:13px">${!cmPerPx ? '待校正' : `${item.pts.length}/3 點`}</span>`;
      } else {
        hasAny = true; total += a;
        valHtml = `<span class="rval" style="color:${color}">${a.toFixed(2)}<span class="runit"> cm²</span></span>`;
      }
      div.innerHTML =
        `<span class="swatch" style="background:${color}"></span>` +
        `<span class="rlabel">框 ${item.i + 1}${item.done ? '' : '(繪製中)'}</span>` +
        valHtml +
        (item.done ? `<button class="rdel" data-i="${item.i}" title="刪除">✕</button>` : '');
      regionList.appendChild(div);
    });

    regionList.querySelectorAll('.rdel').forEach(b => {
      b.addEventListener('click', () => { regions.splice(parseInt(b.dataset.i), 1); refresh(); });
    });

    if (hasAny) {
      let sub = `${(total * 100).toFixed(1)} mm²`;
      if (total >= 100) sub = `${(total / 10000).toFixed(4)} m² · ` + sub;
      totalVal.innerHTML = `${total.toFixed(2)}<div class="unit" style="margin-top:2px">${sub}</div>`;
    } else {
      totalVal.textContent = '—';
    }
  }

  function redraw() {
    if (!img) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    const s = 1 / scale;

    if (calibPts.length) {
      ctx.strokeStyle = '#ffcc33';
      ctx.lineWidth = 3 * s;
      if (calibPts.length === 2) {
        ctx.beginPath();
        ctx.moveTo(calibPts[0].x, calibPts[0].y);
        ctx.lineTo(calibPts[1].x, calibPts[1].y);
        ctx.stroke();
      }
      calibPts.forEach(p => dot(p, '#ffcc33', 6 * s));
    }

    const draws = regions.map((r, i) => ({ pts: r, i, done: true }));
    if (current.length) draws.push({ pts: current, i: regions.length, done: false });
    draws.forEach(item => {
      const color = COLORS[item.i % COLORS.length];
      drawPoly(item.pts, color, s);
      if (item.pts.length >= 1) {
        const c = item.pts.length >= 3 ? centroid(item.pts) : item.pts[0];
        ctx.font = `${16 * s}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.lineWidth = 4 * s; ctx.strokeStyle = 'rgba(0,0,0,.7)';
        ctx.strokeText(String(item.i + 1), c.x, c.y);
        ctx.fillStyle = color;
        ctx.fillText(String(item.i + 1), c.x, c.y);
      }
    });
  }

  function drawPoly(pts, color, s) {
    if (!pts.length) return;
    ctx.strokeStyle = color;
    ctx.fillStyle = hexToRgba(color, 0.22);
    ctx.lineWidth = 3 * s;
    ctx.beginPath();
    pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    if (pts.length >= 3) { ctx.closePath(); ctx.fill(); }
    ctx.stroke();
    pts.forEach(p => dot(p, color, 5 * s));
  }

  function dot(p, color, r) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.fill();
    ctx.lineWidth = 1.5 * (1 / scale); ctx.strokeStyle = '#000'; ctx.stroke();
  }

  function hexToRgba(hex, a) {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  }

  btnRecalib.addEventListener('click', () => {
    calibPts = []; cmPerPx = null; mode = 'calib'; refresh();
  });
  btnFinish.addEventListener('click', () => {
    if (current.length >= 3) regions.push(current);
    current = [];
    refresh();
  });
  btnUndo.addEventListener('click', () => { current.pop(); refresh(); });
  btnClearAll.addEventListener('click', () => { regions = []; current = []; refresh(); });

  function updateButtons() {
    const has = !!img;
    btnRecalib.disabled = !has;
    btnFinish.disabled = current.length < 3;
    btnUndo.disabled = current.length === 0;
    btnClearAll.disabled = regions.length === 0 && current.length === 0;
    if (!img) calibStatus.textContent = '尚未載入照片';
    else if (!cmPerPx && calibStatus.textContent === '尚未載入照片') calibStatus.textContent = '請依上方提示點尺的兩端';
  }

  window.addEventListener('resize', () => { if (img) { setupCanvas(); redraw(); } });
})();
</script>
</body>
</html>
